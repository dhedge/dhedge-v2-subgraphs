specVersion: 1.2.0
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: PoolFactoryMoonlight
    network: hyperevm
    source:
      address: "0xe91505E2Ab653Dd128c71e9690EeEFd28cc5b333"
      abi: PoolFactoryMoonlight
      startBlock: 25742856
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - FundCreated
      abis:
        - name: PoolFactoryMoonlight
          file: ./abis/PoolFactoryMoonlight.json
        - name: PoolLogic
          file: ./abis/PoolLogic.json
      eventHandlers:
        - event: FundCreated(address,bool,string,string,address,uint256,uint256,uint256,uint256)
          handler: handleFundCreated
      file: ./src/pool-factory-moonlight.ts

templates:
  - kind: ethereum/contract
    name: PoolLogic
    network: hyperevm
    source:
      abi: PoolLogic
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Deposit
        - ManagerFeeMinted
        - TransactionExecuted
        - Transfer
        - Withdrawal
        - Pool
        - EntryFeeMinted
        - ExitFeeMinted
        - ReferralFeeMinted
      abis:
        - name: PoolLogic
          file: ./abis/PoolLogic.json
        - name: PoolManagerLogic
          file: ./abis/PoolManagerLogic.json
        - name: ERC20
          file: ./abis/ERC20.json
        - name: WithdrawalVault
          file: ./abis/WithdrawalVault.json
      eventHandlers:
        - event: Deposit(address,address,address,uint256,uint256,uint256,uint256,uint256,uint256,uint256)
          handler: handleDeposit
        - event: ManagerFeeMinted(address,address,uint256,uint256,uint256,uint256)
          handler: handleManagerFeeMinted
          calls:
            PoolLogic.tokenPrice: PoolLogic[event.address].tokenPrice()
        - event: TransactionExecuted(address,address,uint16,uint256)
          handler: handleTransactionExecuted
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
          calls:
            PoolLogic.tokenPrice: PoolLogic[event.address].tokenPrice()
        - event: Withdrawal(address,address,uint256,uint256,uint256,uint256,uint256,(address,uint256,bool)[],uint256)
          handler: handleWithdrawal
        - event: EntryFeeMinted(address,uint256)
          handler: handleEntryFeeMinted
          calls:
            PoolLogic.tokenPrice: PoolLogic[event.address].tokenPrice()
        - event: ExitFeeMinted(address,uint256)
          handler: handleExitFeeMinted
          calls:
            PoolLogic.tokenPrice: PoolLogic[event.address].tokenPrice()
        - event: ReferralFeeMinted(indexed address,uint256)
          handler: handleReferralFeeMinted
          calls:
            PoolLogic.tokenPrice: PoolLogic[event.address].tokenPrice()
      file: ./src/pool-logic.ts
  - kind: ethereum/contract
    name: PoolManagerLogic
    network: hyperevm
    source:
      abi: PoolManagerLogic
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - ManagerUpdated
      abis:
        - name: PoolManagerLogic
          file: ./abis/PoolManagerLogic.json
      eventHandlers:
        - event: ManagerUpdated(address,string)
          handler: handleManagerUpdated
      file: ./src/pool-manager-logic.ts
